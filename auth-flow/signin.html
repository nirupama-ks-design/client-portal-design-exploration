<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Glade Sign In</title>
    <link rel="stylesheet" href="./glade-screen-base.css" />
  </head>
  <body>
    <div class="bg-stage">
      <spline-viewer url="https://prod.spline.design/wW2q9yA967GCMp9k/scene.splinecode"><img src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mP8/x8AAwMCAO2pR5kAAAAASUVORK5CYII=" alt="Spline preview" style="width: 100%; height: 100%;"/></spline-viewer>
    </div>

    <main class="screen">
      <section class="signup-card" aria-label="Sign in">
        <div class="signup-main">
          <div class="logo" aria-hidden="true">
            <img src="./assets/glade-logo.png" alt="Glade logo" />
          </div>

          <h1>Welcome back</h1>
          <p class="subtitle">Sign in to continue to your client portal.</p>

          <form action="../dashboard.html" method="get">
            <div class="field">
              <label for="signin-email">Email</label>
              <div class="input-wrap">
                <input id="signin-email" name="email" type="email" placeholder="Enter your email address" />
              </div>
            </div>

            <div class="field">
              <label for="signin-password">Password</label>
              <div class="input-wrap">
                <input id="signin-password" name="password" type="password" placeholder="Enter password" />
                <svg class="eye" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                  <path d="M3 3l18 18" stroke="#545454" stroke-width="1.8" stroke-linecap="round"/>
                  <path d="M10.6 10.6a2 2 0 0 0 2.8 2.8" stroke="#545454" stroke-width="1.8" stroke-linecap="round"/>
                  <path d="M9.4 5.1A10.7 10.7 0 0 1 12 4.8c5.7 0 9.7 5.2 10.6 6.4a1.3 1.3 0 0 1 0 1.5 19.3 19.3 0 0 1-4.1 4.3" stroke="#545454" stroke-width="1.8" stroke-linecap="round"/>
                  <path d="M6.2 7.3A18.3 18.3 0 0 0 1.4 11a1.3 1.3 0 0 0 0 1.7C2.7 14.3 6.6 19.2 12 19.2c1.6 0 3-.3 4.4-.9" stroke="#545454" stroke-width="1.8" stroke-linecap="round"/>
                </svg>
              </div>
            </div>

            <button class="cta" type="submit">Sign in</button>
          </form>
        </div>

        <div class="signup-foot">Don't have an account?&nbsp;<a href="./signup-lawfirm.html">Sign up</a></div>
      </section>
    </main>

    <footer class="page-footer" aria-label="Footer">
      <div class="footer-left"><span>Terms &amp; Agreements</span><span>Privacy Policy</span></div>
      <div class="footer-mid"><span>Powered by</span><img class="footer-logo-horizontal" src="./assets/glade-logo-horizontal-black.png" alt="Glade logo" /></div>
      <div class="footer-right">© Glade Intelligence Corp.</div>
    </footer>

    <script type="module" src="https://unpkg.com/@splinetool/viewer@1.12.82/build/spline-viewer.js" async></script>
    <script src="./spline-tune.js"></script>
    <script>
      const signinForm = document.querySelector("form");
      signinForm?.addEventListener("submit", () => {
        sessionStorage.setItem("gladePortalAuth", "true");
      });
    </script>
  </body>
</html>
