<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Glade Signup - Full Form</title>
    <link rel="stylesheet" href="./glade-screen-base.css" />
  </head>
  <body>
    <div id="blob-root" class="bg-stage"></div>
    <div class="bg-haze"></div>

    <main class="screen">
      <section class="signup-card" aria-label="Create your account">
        <div class="signup-main">
          <div class="logo" aria-hidden="true">
            <img src="./assets/glade-logo.png" alt="Glade logo" />
          </div>

          <h1>Create your account</h1>
          <p class="subtitle">The platform your clients trust.</p>

          <form action="../dashboard.html" method="get">
            <div class="field">
              <label for="your-name">Your Name</label>
              <div class="input-wrap">
                <input id="your-name" name="name" type="text" placeholder="Enter your name" />
              </div>
            </div>

            <div class="field">
              <label for="email">Email</label>
              <div class="input-wrap">
                <input id="email" name="email" type="email" placeholder="Enter your email address" />
              </div>
            </div>

            <div class="field">
              <label for="password">Password</label>
              <div class="input-wrap">
                <input id="password" name="password" type="password" placeholder="Enter password" />
                <svg class="eye" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                  <path d="M3 3l18 18" stroke="#545454" stroke-width="1.8" stroke-linecap="round"/>
                  <path d="M10.6 10.6a2 2 0 0 0 2.8 2.8" stroke="#545454" stroke-width="1.8" stroke-linecap="round"/>
                  <path d="M9.4 5.1A10.7 10.7 0 0 1 12 4.8c5.7 0 9.7 5.2 10.6 6.4a1.3 1.3 0 0 1 0 1.5 19.3 19.3 0 0 1-4.1 4.3" stroke="#545454" stroke-width="1.8" stroke-linecap="round"/>
                  <path d="M6.2 7.3A18.3 18.3 0 0 0 1.4 11a1.3 1.3 0 0 0 0 1.7C2.7 14.3 6.6 19.2 12 19.2c1.6 0 3-.3 4.4-.9" stroke="#545454" stroke-width="1.8" stroke-linecap="round"/>
                </svg>
              </div>
            </div>

            <button class="cta" type="submit">Sign up</button>
          </form>
        </div>

        <div class="signup-foot">Already have an account?&nbsp;<a href="./signin.html">Sign in</a></div>
      </section>
    </main>

    <footer class="page-footer" aria-label="Footer">
      <div class="footer-left"><span>Terms &amp; Agreements</span><span>Privacy Policy</span></div>
      <div class="footer-mid"><span>Powered by</span><span class="pill-logo"></span><span>glade.ai</span></div>
      <div class="footer-right">©Glade AI inc</div>
    </footer>

    <script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
    <script src="./glade-blob-background.js"></script>
    <script>
      const signupForm = document.querySelector("form");
      signupForm?.addEventListener("submit", () => {
        sessionStorage.setItem("gladePortalAuth", "true");
      });
      window.initGladeBlobBackground(document.getElementById("blob-root"));
    </script>
  </body>
</html>
