<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Glade Signup - Law Firm</title>
    <link rel="stylesheet" href="./glade-screen-base.css" />
  </head>
  <body>
    <div class="bg-stage bg-stage-primary">
      <spline-viewer url="https://prod.spline.design/wW2q9yA967GCMp9k/scene.splinecode"></spline-viewer>
    </div>
    <div class="bg-stage bg-stage-secondary">
      <spline-viewer url="https://prod.spline.design/wW2q9yA967GCMp9k/scene.splinecode"></spline-viewer>
    </div>

    <main class="screen">
      <section class="signup-card" aria-label="Create your account">
        <div class="signup-main">
          <div class="logo" aria-hidden="true">
            <img src="./assets/glade-logo.png" alt="Glade logo" />
          </div>

          <h1>Create your account</h1>
          <p class="subtitle">The platform your clients trust.</p>

          <form action="./signup-full.html" method="get">
            <div class="field">
              <label for="firm-name">Law Firm name</label>
              <div class="input-wrap">
                <input id="firm-name" name="law_firm_name" type="text" placeholder="Enter name of your Law firm" />
              </div>
            </div>

            <button class="cta" type="submit">Continue</button>
          </form>
        </div>

        <div class="signup-foot">Already have an account?&nbsp;<a href="./signin.html">Sign in</a></div>
      </section>
    </main>

    <footer class="page-footer" aria-label="Footer">
      <div class="footer-left"><span>Terms &amp; Agreements</span><span>Privacy Policy</span></div>
      <div class="footer-mid"><span>Powered by</span><img class="footer-logo-horizontal" src="./assets/glade-logo-horizontal.png" alt="Glade logo" /></div>
      <div class="footer-right">Glade Intelligence Corp.</div>
    </footer>

    <script type="module" src="https://unpkg.com/@splinetool/viewer@1.9.59/build/spline-viewer.js"></script>
    <script src="./spline-tune.js"></script>
  </body>
</html>
