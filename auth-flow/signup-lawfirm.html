<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Glade Signup - Law Firm</title>
    <link rel="stylesheet" href="./glade-screen-base.css" />
  </head>
  <body>
    <div class="spline-bg">
      <spline-viewer
        loading-anim-type="spinner-small-light"
        url="https://prod.spline.design/wW2q9yA967GCMp9k/scene.splinecode"
        style="width:100%;height:100%"
      ></spline-viewer>
    </div>

    <main class="page-content">
      <section class="signup-card" aria-label="Create your account">
        <div class="signup-main">
          <div class="logo" aria-hidden="true">
            <img src="./assets/glade-logo.png" alt="Glade logo" />
          </div>

          <h1>Create your account</h1>
          <p class="subtitle">The platform your clients trust.</p>

          <form action="./signup-full.html" method="get">
            <div class="field">
              <label for="firm-name">Law Firm name</label>
              <div class="input-wrap">
                <input id="firm-name" name="law_firm_name" type="text" placeholder="Enter name of your Law firm" />
              </div>
            </div>

            <button class="cta" type="submit">Continue</button>
          </form>
        </div>

        <div class="signup-foot">Already have an account?&nbsp;<a href="./signin.html">Sign in</a></div>
      </section>
    </main>

    <footer class="page-footer" aria-label="Footer">
      <div class="footer-left"><span>Terms &amp; Agreements</span><span>Privacy Policy</span></div>
      <div class="footer-mid"><span>Powered by</span><img class="footer-logo-horizontal" src="./assets/glade-logo-horizontal-black.png" alt="Glade logo" /></div>
      <div class="footer-right">© Glade Intelligence Corp.</div>
    </footer>

    <script type="module" src="https://unpkg.com/@splinetool/viewer@1.12.82/build/spline-viewer.js" async></script>
    <script>
      document.querySelector("spline-viewer")?.addEventListener("load", function () {
        this.closest(".spline-bg")?.classList.add("loaded");
      });
    </script>
  </body>
</html>
